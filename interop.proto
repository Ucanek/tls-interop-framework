syntax = "proto3";

package tls.interop;

// Definice rolí v testu
enum Role {
  ROLE_UNSPECIFIED = 0;
  CLIENT = 1;
  SERVER = 2;
}

// Flags pro Capability Filter (podle tvého dokumentu)
enum ModifyFlag {
  UNSUPPORTED = 0;
  READ = 1;
  SET = 2;
  NEGOTIATE = 4;
}

// --- DISPATCHER MESSAGES ---

message Capability {
  string name = 1;                // Např. "TLS_AES_256_GCM_SHA384"
  repeated ModifyFlag flags = 2;  // Co s tím knihovna umí (Set/Negotiate...)
}

message LibraryMetadata {
  string component_name = 1;      // Např. "OpenSSL"
  string version = 2;             // Např. "3.0.2"
  repeated Role roles = 3;        // Umí být klient i server?
  repeated Capability supported_versions = 4;
  repeated Capability cipher_suites = 5;
  repeated Capability groups = 6;
}

// --- COORDINATOR MESSAGES ---

message TlsConfig {
  string version = 1;             // Vybraná verze pro tento test
  string cipher_suite = 2;
  string server_hostname = 3;
  int32 port = 4;
  bytes certificate = 5;          // Certifikát v binární formě
  bytes private_key = 6;
}

message OperationRequest {
  enum OpType {
    ESTABLISH = 0;
    TRANSMIT = 1;
    KEY_UPDATE = 2;
    CLOSE = 3;
  }
  OpType type = 1;
  Role role = 2;
  bytes payload = 3;
  TlsConfig config = 4;
}

message OperationResponse {
  enum Status {
    SUCCESS = 0;
    FAILURE = 1;
    ERROR = 2;
  }
  Status status = 1;
  string message = 2;             // Chybová hláška nebo info
  bytes output_data = 3;          // Přijatá data při TRANSMIT
  string logs = 4;                // Výstup z utility (stdout/stderr)
}

// --- SERVICE DEFINITION (Volitelné pro gRPC) ---

service TlsInteropWrapper {
  rpc GetMetadata(Empty) returns (LibraryMetadata);
  rpc ExecuteOperation(OperationRequest) returns (OperationResponse);
}

message Empty {}