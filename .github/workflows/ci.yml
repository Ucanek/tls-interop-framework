name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install grpcio grpcio-tools 'protobuf>=4.21'

      - name: Generate protobuf and certs
        run: |
          ./scripts/run.sh protoc
          ./scripts/run.sh certs

      - name: Capability filter (phase 2.3) self-check
        run: ./scripts/run.sh capability-test

      - name: Run local test
        run: ./scripts/run.sh local

      - name: Run Docker (9 server×client combos)
        run: ./scripts/run.sh docker
