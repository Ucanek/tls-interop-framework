syntax = "proto3";

package tls.interop;

// Test role (client or server)
enum Role {
  ROLE_UNSPECIFIED = 0;
  CLIENT = 1;
  SERVER = 2;
}

// Capability filter flags
enum ModifyFlag {
  UNSUPPORTED = 0;
  READ = 1;
  SET = 2;
  NEGOTIATE = 4;
}

// --- Dispatcher / capability messages ---

message Capability {
  string name = 1;
  repeated ModifyFlag flags = 2;
}

message LibraryMetadata {
  string component_name = 1;
  string version = 2;
  repeated Role roles = 3;
  repeated Capability supported_versions = 4;
  repeated Capability cipher_suites = 5;
  repeated Capability groups = 6;
}

// --- Coordinator / operation messages ---

message TlsConfig {
  string version = 1;
  string cipher_suite = 2;
  string server_hostname = 3;
  int32 port = 4;
  bytes certificate = 5;
  bytes private_key = 6;
}

message OperationRequest {
  enum OpType {
    ESTABLISH = 0;
    TRANSMIT = 1;
    KEY_UPDATE = 2;
    CLOSE = 3;
  }
  OpType type = 1;
  Role role = 2;
  bytes payload = 3;
  TlsConfig config = 4;
}

message OperationResponse {
  enum Status {
    SUCCESS = 0;
    FAILURE = 1;
    ERROR = 2;
  }
  Status status = 1;
  string message = 2;
  bytes output_data = 3;
  string logs = 4;
}

// --- gRPC service ---

service TlsInteropWrapper {
  rpc GetMetadata(Empty) returns (LibraryMetadata);
  rpc ExecuteOperation(OperationRequest) returns (OperationResponse);
}

message Empty {}
